# Parameters for the fusion node (executable genesis_icp_node, node name genesis_icp).
genesis_icp:
  ros__parameters:
    use_sim_time: false
    use_socket_bridge: true
    fusion_listen_port_robot_a: 4403
    fusion_listen_port_robot_b: 4405

    scan_topic_robot_a: "/JK3/sensors/lidar2d_0/scan"
    scan_topic_robot_b: "/JK5/sensors/lidar2d_0/scan"
    odom_frame_robot_a: "JK3/odom"
    odom_frame_robot_b: "JK5/odom"
    base_frame_robot_a: "JK3/base_link"
    base_frame_robot_b: "JK5/base_link"

    # When false (default): match in a canonical frame with both bases at identity; only initial_guess_*
    # and laser extrinsics place scan B—wheel odom in packets is ignored for pose placement (good when
    # each robot reports ~(0,0,0) but physical layout varies). Set true for bags / legacy odom-coupled use.
    use_odom_poses_for_match: false

    # Approximate pose of robot B in A's match frame (m, rad). With use_odom_poses_for_match false this is
    # the sole translation/rotation prior for scan B; widen correlation_search_space_* and/or multi_seed_*.
    initial_guess_odom_b_in_a_x: 0.0
    initial_guess_odom_b_in_a_y: 0.0
    initial_guess_odom_b_in_a_yaw: 0.0

    # Coarse grid of MatchScan seeds around initial_guess (adds CPU; capped by multi_seed_max_seeds).
    multi_seed_match: true
    multi_seed_xy_step_m: 1.0
    multi_seed_xy_extent_m: 1.0
    multi_seed_yaw_step_deg: 10.0
    multi_seed_yaw_extent_deg: 20.0
    multi_seed_max_seeds: 48

    global_odom_frame: "global_odom"
    odom_child_frame_robot_a: "JK3/odom"
    odom_child_frame_robot_b: "JK5/odom"
    tf_static_topic_robot_a: "/JK3/tf_static"
    tf_static_topic_robot_b: "/JK5/tf_static"
    anchor_mode: "robot_a"

    # Wait for N consecutive matches above minimum_match_response before the first tf_static publish
    # (reliable + transient_local on fusion domain; bridge can copy to robot domains). After the first
    # publish, each good match republishes (like updating a static_transform_publisher). Set to 1 to
    # publish as soon as one match passes the threshold.
    tf_static_min_consecutive_matches: 3
    # If true, publish tf_static only once after the consecutive gate, then stop updating.
    tf_static_publish_only_once: false

    # Bags / multi-robot often have seconds of header stamp skew; pairing uses a buffer and min |t_a-t_b|.
    max_time_delta_sec: 10.0
    scan_pair_buffer_size: 80
    minimum_match_response: 0.05
    max_laser_range: 10.0
    # false: do not penalize match away from odometric seed (better for large guess error).
    match_scan_do_penalize: false
    # 0 = off; 0.2–0.35 smooths published TF (less jitter when stationary).
    relative_pose_smooth_alpha: 0.28

    laser_id_robot_a: "genesis_robot_a_laser"
    laser_id_robot_b: "genesis_robot_b_laser"

    use_scan_matching: true
    use_scan_barycenter: true
    minimum_travel_distance: 0.3
    minimum_travel_heading: 0.3
    scan_buffer_size: 20
    scan_buffer_maximum_scan_distance: 25.0
    link_match_minimum_response_fine: 0.05
    link_scan_maximum_distance: 3.0
    loop_search_maximum_distance: 15.0
    do_loop_closing: false
    loop_match_minimum_chain_size: 5
    loop_match_maximum_variance_coarse: 9.0
    loop_match_minimum_response_coarse: 0.15
    loop_match_minimum_response_fine: 0.20
    # Must cover true |delta pose| from seed (~half the grid radius). Too small => wrong range (~0.3 m) + jitter.
    # dimension / resolution must be numerically integer (Karto ScanMatcher::Create assert).
    correlation_search_space_dimension: 3.0
    correlation_search_space_resolution: 0.05
    # Lower (~0.02–0.03) sharpens the grid (less smearing); sparse scan overlap may need slightly higher
    # smearing or a higher minimum_match_response to reject false locks.
    correlation_search_space_smear_deviation: 0.03
    loop_search_space_dimension: 15.0
    loop_search_space_resolution: 0.05
    loop_search_space_smear_deviation: 0.05
    distance_variance_penalty: 0.3
    angle_variance_penalty: 0.8
    fine_search_angle_offset: 0.00349
    coarse_search_angle_offset: 0.5
    coarse_angle_resolution: 0.0349
    minimum_angle_penalty: 0.7
    minimum_distance_penalty: 0.3
    use_response_expansion: true
    min_pass_through: 4
    occupancy_threshold: 0.25
    min_laser_range: 0.2
