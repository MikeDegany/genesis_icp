#
# Offline replay: bag paths and launch options for offline_genesis_icp.launch.py
#
# Edit robot_a_bag / robot_b_bag to absolute paths (or paths relative to this file's directory).
# Copy this file elsewhere if you prefer; pass it in with:
#   ros2 launch genesis_icp offline_genesis_icp.launch.py offline_config:=/path/to/your.yaml

offline_genesis_icp:
  # Required: rosbag2 directories or .db3 files (one bag per robot domain).
  robot_a_bag: "/home/UNT/md0708/BagFiles/multirobot_bags/313131-JK3/JK3-31Mar1m20d"
  robot_b_bag: "/home/UNT/md0708/BagFiles/multirobot_bags/313131/JK5-31Mar1m20d"

  # Optional: override fusion parameter file (null = package share config/genesis_icp.yaml).
  fusion_params_file: null

  # Merged into the genesis_icp node (flat ros__parameters-style keys for that node).
  extra_fusion_parameters:
    use_odom_poses_for_match: true
    multi_seed_match: false

  use_sim_time: true
  robot_a_ros_domain_id: 3
  robot_b_ros_domain_id: 5
  fusion_ros_domain_id: 0
  robot_a_namespace: JK3
  robot_b_namespace: JK5

  scan_use_best_effort_qos: false
  tf_static_use_transient_local: false
  max_time_delta_sec: 10.0

  bag_play:
    clock: true
    rate: 1.0
    loop: false
    # Seconds; forwarded to ros2 bag play when supported.
    start_offset: 0.0
    # Extra CLI tokens, e.g. ["--read-ahead-queue-size", "1000"]
    additional_args: []
