# Overlay for genesis_icp_offline_node (node name: genesis_icp).
# Loaded after config/genesis_icp.yaml by offline_genesis_icp.launch.py

genesis_icp:
  ros__parameters:
    # Required: rosbag2 directories (folders containing metadata.yaml + db3/mcap).
    robot_a_bag: "/home/UNT/md0708/Desktop/JK3-GenesisHomeTest1"
    robot_b_bag: "/home/UNT/md0708/Desktop/JK5-GenesisHomeTest1"

    # Topics as recorded in each bag (leading slash optional).
    robot_a_scan_topic: "/JK3/sensors/lidar2d_0/scan"
    robot_b_scan_topic: "/JK5/sensors/lidar2d_0/scan"
    robot_a_tf_topic: "/JK3/tf"
    robot_b_tf_topic: "/JK5/tf"
    robot_a_tf_static_topic: "/JK3/tf_static"
    robot_b_tf_static_topic: "/JK5/tf_static"

    # TF frame IDs inside each bag (usually unprefixed odom/base_link per robot, matching socket relay).
    odom_frame_robot_a: "odom"
    base_frame_robot_a: "base_link"
    odom_frame_robot_b: "odom"
    base_frame_robot_b: "base_link"

    # 0 = process as fast as possible; 1.0 = sleep to approximate recorded timeline.
    playback_realtime_factor: 0.0
    # 0 = no limit (full bags); set e.g. 5000 for a quick smoke test.
    max_bag_messages: 0

    # Prefer true for bags with meaningful wheel odometry in TF + packets.
    use_odom_poses_for_match: true
    multi_seed_match: false
